name: Release

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release --dry-run (true = preview only, no publish)"
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: theholocron/.github/.github/actions/setup@main
        name: Setup

      - name: Ensure npm supports OIDC Trusted Publishing
        run: npm install -g npm@latest sigstore

      - run: pnpm install --frozen-lockfile
        name: Install

      - run: pnpm build
        name: Build

      - name: Verify
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm exec semantic-release --dry-run
          else
            pnpm exec semantic-release
          fi
