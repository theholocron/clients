packages:
  - 'packages/*'

# Shared dep versions used across packages.
catalog:
  '@theholocron/commitlint-config': ^7.4.1
  '@theholocron/eslint-config': ^7.4.1
  '@theholocron/http-client': ^0.11.5
  '@theholocron/lint-staged-config': ^7.4.1
  '@theholocron/prettier-config': ^7.4.1
  '@theholocron/semantic-release-config': ^7.4.1
  '@theholocron/tsconfig': ^7.4.1
  '@theholocron/tsdown-config': ^7.4.1
  '@theholocron/vitest-config': ^7.4.1
  '@types/node': ^26.1.1
  '@vitest/coverage-v8': ^4.1.10
  '@vitest/eslint-plugin': ^1.6.23
  eslint: ^10.7.0
  eslint-plugin-n: ^18.2.2
  globals: ^17.7.0
  tsdown: ^0.22.13
  typescript: ^5.9.3
  vitest: ^4.1.10

# Holocron CLI and plugins — range covers all alpha releases; switch to ^2.0.0 on stable.
catalogs:
  holocron:
    '@theholocron/cli': ^2.1.1
    '@theholocron/holocron-config': ^7.4.1
    '@theholocron/holocron-plugin-github': ^2.1.1
